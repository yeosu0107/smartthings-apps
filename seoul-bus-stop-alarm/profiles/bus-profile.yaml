name: seoul-bus-stop-alarm
components:
  - id: main
    capabilities:
      - id: momentary
        version: 1
      - id: waterabout01957.busmessage
        version: 1
    categories:
      - name: Switch
preferences:
  - name: apiKey
    title: "공공데이터포털 API Key"
    description: "발급받으신 서비스 키를 입력해주세요."
    required: true
    preferenceType: string
    definition:
      stringType: text
      minLength: 0
      maxLength: 255
      default: ""
  - name: stationId
    title: "정류소 ID (ARS-ID)"
    description: "조회할 서울 버스 정류소의 고유 번호를 입력해주세요."
    required: true
    preferenceType: string
    definition:
      stringType: text
      minLength: 0
      maxLength: 255
      default: ""
  - name: refreshToken
    title: "SmartThings Refresh Token"
    description: "https://edge-driver-oauth-broker.netlify.app 에서 발급받은 refresh token을 붙여 넣으세요."
    required: false
    preferenceType: string
    definition:
      stringType: text
      minLength: 0
      maxLength: 2048
      default: ""
  - name: speakerDeviceId
    title: "스피커 Device ID"
    description: "TTS를 재생할 SmartThings 스피커(예: 갤럭시 홈 미니)의 device ID."
    required: false
    preferenceType: string
    definition:
      stringType: text
      minLength: 0
      maxLength: 64
      default: ""
